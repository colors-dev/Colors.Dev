name: CI

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest

    strategy:
      fail-fast: false
      matrix:
        configuration: [Debug, Release]
        platform: [x64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: msbuild Colors.Dev.sln /t:Restore /p:Configuration=${{ matrix.configuration }} /p:Platform=${{ matrix.platform }}

      - name: Build
        run: msbuild Colors.Dev.sln /m /p:Configuration=${{ matrix.configuration }} /p:Platform=${{ matrix.platform }}

      - name: Package
        if: matrix.configuration == 'Release'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          Copy-Item "${{ matrix.platform }}/${{ matrix.configuration }}/Colors.Dev.dll" -Destination release
          Copy-Item "${{ matrix.platform }}/${{ matrix.configuration }}/Colors.Dev.lib" -Destination release
          Copy-Item "*.h" -Destination release -ErrorAction SilentlyContinue

      - name: Upload artifact
        if: matrix.configuration == 'Release'
        uses: actions/upload-artifact@v4
        with:
          name: Colors.Dev-${{ github.ref_name }}-${{ matrix.platform }}
          path: release

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/') && matrix.configuration == 'Release'
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
